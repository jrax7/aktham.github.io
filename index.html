<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#04060c;
  --acc:#3b82f6;--acc2:#60a5fa;--acc3:#1d4ed8;
  --text:#eef1f8;--text2:#7d8a9e;--text3:#1e2a3a;
  --card:rgba(18,22,34,0.75);
  --border:rgba(255,255,255,0.055);
  --border2:rgba(59,130,246,0.22);
  --mono:'JetBrains Mono',monospace;
  --display:'Sora',sans-serif;
}
/* ─── LIGHT THEME ─── */
[data-theme="light"]{
  --bg:#f0f4ff;
  --acc:#2563eb;--acc2:#3b82f6;--acc3:#1d4ed8;
  --text:#0f172a;--text2:#475569;--text3:#cbd5e1;
  --card:rgba(255,255,255,0.8);
  --border:rgba(0,0,0,0.08);
  --border2:rgba(37,99,235,0.28);
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--display);cursor:none;transition:background .35s,color .35s;}

/* ─── REDUCED MOTION ─── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}
  #cur,#cur-ring,.trail-dot{display:none!important;}
  body{cursor:auto!important;}
  #hex-canvas,#bg{display:none!important;}
}

/* ─── CUSTOM CURSOR (mouse only) ─── */
@media(pointer:fine){
  #cur{position:fixed;width:6px;height:6px;background:var(--acc2);border-radius:50%;
    pointer-events:none;z-index:9999;transform:translate(-50%,-50%);
    mix-blend-mode:screen;transition:width .15s,height .15s,background .35s;}
  #cur-ring{position:fixed;width:28px;height:28px;border:1px solid rgba(59,130,246,.35);
    border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);
    transition:width .2s,height .2s,border-color .2s;}
  body:has(a:hover,button:hover) #cur{width:12px;height:12px;}
  body:has(a:hover,button:hover) #cur-ring{width:44px;height:44px;border-color:rgba(59,130,246,.6);}
}
@media(pointer:coarse){
  body{cursor:auto;}
  #cur,#cur-ring{display:none;}
}

/* ─── CANVAS ─── */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
#hex-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.18;}
[data-theme="light"] #hex-canvas{opacity:.09;}
[data-theme="light"] #bg{opacity:.4;}

/* ─── NOISE ─── */
#noise{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;}

/* ─── VIGNETTE ─── */
#vig{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 35%,rgba(2,4,10,.9) 100%);
  transition:opacity .35s;}
[data-theme="light"] #vig{opacity:.15;}

/* ─── SKIP LINK ─── */
#skip-link{position:fixed;top:-100px;left:1rem;z-index:9999;
  background:var(--acc);color:#fff;padding:.5rem 1rem;border-radius:6px;
  font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;text-decoration:none;
  transition:top .2s;}
#skip-link:focus{top:1rem;}

/* ─── BOOT SEQUENCE ─── */
#boot{position:fixed;inset:0;z-index:500;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:.45rem;
  font-family:var(--mono);font-size:.68rem;color:var(--acc);letter-spacing:.1em;
  transition:opacity .5s ease;}
#boot.fade{opacity:0;pointer-events:none;}
#boot-skip{position:absolute;bottom:2rem;right:2rem;font-family:var(--mono);font-size:.6rem;
  color:var(--text2);letter-spacing:.1em;background:none;border:1px solid var(--border);
  padding:.3rem .8rem;border-radius:5px;cursor:pointer;transition:color .2s,border-color .2s;}
#boot-skip:hover,#boot-skip:focus{color:var(--acc);border-color:var(--border2);outline:none;}
.boot-line{opacity:0;animation:bootIn .15s ease forwards;}
.boot-bar{width:200px;height:2px;background:rgba(59,130,246,.12);border-radius:2px;margin-top:.75rem;overflow:hidden;}
.boot-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--acc3),var(--acc),var(--acc2));border-radius:2px;transition:width .05s linear;}
@keyframes bootIn{to{opacity:1;}}

/* ─── THEME TOGGLE ─── */
#theme-btn{position:fixed;top:1.4rem;right:4.5rem;z-index:20;
  width:32px;height:32px;border:1px solid var(--border);border-radius:8px;
  background:var(--card);backdrop-filter:blur(12px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:color .2s,border-color .2s,transform .2s,background .35s;}
#theme-btn:hover{color:var(--acc2);border-color:var(--border2);transform:translateY(-2px);}
#theme-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;pointer-events:none;}
#theme-btn:focus{outline:2px solid var(--acc);outline-offset:2px;}

/* --- SCENE --- */
#scene{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
  align-items:center;padding:0;}

/* badge pinned top */
.badge-wrap{position:absolute;top:3rem;left:0;right:0;display:flex;justify-content:center;
  opacity:0;animation:fadeUp .5s .1s ease forwards;}

/* center block */
.center-block{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:0 2rem;}

/* socials pinned bottom */
.socials-wrap{position:absolute;bottom:4rem;left:0;right:0;display:flex;justify-content:center;
  opacity:0;animation:fadeUp .5s .7s ease forwards;}

/* --- BADGE --- */
.badge{font-family:var(--mono);font-size:.6rem;color:var(--acc2);letter-spacing:.18em;
  text-transform:uppercase;border:1px solid var(--border2);
  background:rgba(59,130,246,.05);padding:.3rem 1.1rem;border-radius:100px;
  display:inline-flex;align-items:center;gap:.5rem;}
.bdot{width:5px;height:5px;border-radius:50%;background:var(--acc);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.5);}50%{box-shadow:0 0 0 5px transparent;}}

/* --- NAME --- */
.name-wrap{text-align:center;margin-bottom:1.8rem;
  opacity:0;animation:fadeUp .5s .25s ease forwards;line-height:.9;}
.n-first{display:block;font-size:clamp(3.5rem,9.5vw,8rem);font-weight:200;
  letter-spacing:-.02em;color:rgba(238,241,248,.4);font-style:italic;}
[data-theme="light"] .n-first{color:rgba(15,23,42,.25);}
.n-last{display:block;font-size:clamp(4.2rem,11.5vw,10rem);font-weight:800;
  letter-spacing:-.045em;line-height:.88;
  background:linear-gradient(125deg,#fff 0%,var(--acc2) 40%,var(--acc) 65%,var(--acc3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;}
[data-theme="light"] .n-last{background:linear-gradient(125deg,#0f172a 0%,var(--acc2) 40%,var(--acc) 65%,var(--acc3) 100%);-webkit-background-clip:text;background-clip:text;}
.n-last::before,.n-last::after{content:attr(data-t);position:absolute;left:0;top:0;width:100%;
  background:inherit;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.n-last::before{animation:gA 6s 1.5s infinite;clip-path:polygon(0 0,100% 0,100% 33%,0 33%);}
.n-last::after{animation:gB 6s 1.6s infinite;clip-path:polygon(0 67%,100% 67%,100% 100%,0 100%);}
@keyframes gA{0%,91%,100%{transform:none;opacity:0;}
  92%{transform:translate(-4px,1px) skewX(-2deg);opacity:.9;}
  94%{transform:translate(4px,-2px) skewX(2deg);opacity:.9;}96%{transform:none;opacity:0;}}
@keyframes gB{0%,91%,100%{transform:none;opacity:0;}
  92%{transform:translate(4px,-1px) skewX(2deg);opacity:.9;}
  94%{transform:translate(-4px,2px) skewX(-2deg);opacity:.9;}96%{transform:none;opacity:0;}}

/* ─── TAGLINE ─── */
.tagline{font-family:var(--mono);font-size:clamp(.6rem,.8vw,.76rem);
  color:var(--text2);letter-spacing:.12em;text-align:center;margin-bottom:2.2rem;
  opacity:0;animation:fadeUp .5s .4s ease forwards;}
.tagline em{color:var(--acc);font-style:normal;opacity:.6;}

/* ─── LINK CARDS ─── */
.links{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;
  margin-bottom:0;opacity:0;animation:fadeUp .5s .55s ease forwards;}
.lc{position:relative;display:flex;align-items:center;gap:.7rem;
  padding:1rem 1.7rem;background:var(--card);border:1px solid var(--border);border-radius:12px;
  text-decoration:none;color:var(--text2);font-size:.8rem;font-weight:500;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:color .2s,border-color .25s,transform .2s,box-shadow .25s,background .35s;
  overflow:hidden;white-space:nowrap;}
.lc::before{content:'';position:absolute;inset:0;border-radius:12px;
  background:linear-gradient(125deg,rgba(59,130,246,.13),rgba(96,165,250,.04),rgba(29,78,216,.09));
  opacity:0;transition:opacity .25s;}
.lc:hover,.lc:focus-visible{color:var(--text);border-color:transparent;outline:none;
  transform:translateY(-4px) scale(1.02);
  box-shadow:0 16px 50px rgba(59,130,246,.18),0 0 0 1px rgba(59,130,246,.25);}
.lc:hover::before,.lc:focus-visible::before{opacity:1;}
.lc:focus-visible{outline:2px solid var(--acc);outline-offset:2px;}
/* sweep */
.lc::after{content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.055),transparent);
  transform:skewX(-15deg);transition:left .4s ease;}
.lc:hover::after{left:130%;}
.lc .ico{width:30px;height:30px;background:rgba(59,130,246,.07);border:1px solid var(--border2);
  border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .2s,border-color .2s;}
.lc:hover .ico,.lc:focus-visible .ico{background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.45);}
.lc .ico svg{width:13px;height:13px;fill:none;stroke:var(--acc);stroke-width:2;}
.lc .arr{margin-left:.25rem;opacity:0;transform:translateX(-5px);
  transition:opacity .2s,transform .2s;color:var(--acc);font-size:.65rem;}
.lc:hover .arr,.lc:focus-visible .arr{opacity:1;transform:none;}
/* featured */
.lc.feat{border-color:rgba(59,130,246,.18);background:rgba(59,130,246,.04);}
.shine{position:absolute;top:0;left:-80%;width:45%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(59,130,246,.08),transparent);
  transform:skewX(-15deg);animation:featShine 3.5s 1.8s infinite;}
@keyframes featShine{0%{left:-80%;}100%{left:130%;}}
.tag{font-family:var(--mono);font-size:.52rem;color:var(--acc);
  background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);
  padding:.08rem .42rem;border-radius:3px;letter-spacing:.07em;text-transform:uppercase;margin-left:.35rem;}

/* ─── SOCIALS ─── */
.socials{display:flex;gap:.8rem;align-items:center;}
.soc{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:9px;color:rgba(125,138,158,.45);
  background:var(--card);backdrop-filter:blur(12px);text-decoration:none;
  transition:color .2s,border-color .2s,transform .2s,box-shadow .2s,background .35s;}
.soc:hover,.soc:focus-visible{color:var(--acc2);border-color:var(--border2);
  transform:translateY(-3px) scale(1.06);box-shadow:0 8px 24px rgba(59,130,246,.2);}
.soc:focus-visible{outline:2px solid var(--acc);outline-offset:2px;}
.soc svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;}
.sdiv{width:1px;height:18px;background:var(--text3);}

/* ─── COPY TOAST ─── */
#copy-toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%) translateY(10px);
  font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;color:#fff;
  background:rgba(59,130,246,.9);padding:.4rem 1rem;border-radius:6px;
  opacity:0;pointer-events:none;z-index:100;transition:opacity .2s,transform .2s;
  white-space:nowrap;}
#copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── META ─── */
.meta{position:fixed;bottom:1.6rem;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:.54rem;color:rgba(40,55,75,.75);
  letter-spacing:.1em;z-index:10;white-space:nowrap;
  opacity:0;animation:fadeUp .5s .85s ease forwards;}

/* ─── CORNERS ─── */
.corner{position:fixed;z-index:10;pointer-events:none;opacity:.18;}
.corner svg{width:24px;height:24px;stroke:var(--acc);fill:none;stroke-width:1.2;}
.c-tl{top:1.4rem;left:1.4rem;}
.c-tr{top:1.4rem;right:1.4rem;transform:scaleX(-1);}
.c-bl{bottom:1.4rem;left:1.4rem;transform:scaleY(-1);}
.c-br{bottom:1.4rem;right:1.4rem;transform:scale(-1);}

/* ─── SCANLINE ─── */
.scan{position:fixed;left:0;right:0;height:1px;z-index:4;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(59,130,246,.22) 50%,transparent);
  animation:scan 10s linear infinite;opacity:.45;}
@keyframes scan{0%{top:-1px;}100%{top:100vh;}}

/* ─── RIPPLE ─── */
.ripple{position:fixed;border-radius:50%;pointer-events:none;z-index:9;
  border:1px solid rgba(59,130,246,.5);width:4px;height:4px;
  transform:translate(-50%,-50%) scale(0);
  animation:rippleOut .75s ease-out forwards;}
@keyframes rippleOut{to{transform:translate(-50%,-50%) scale(1);opacity:0;width:100px;height:100px;}}

/* ─── KEYBOARD SHORTCUTS ─── */
#kbd-hint{position:fixed;bottom:3.2rem;right:2.5rem;z-index:20;
  font-family:var(--mono);font-size:.5rem;color:rgba(125,138,158,.35);
  letter-spacing:.08em;display:flex;gap:.6rem;align-items:center;
  opacity:0;animation:fadeUp .5s 1.1s ease forwards;}
#kbd-hint kbd{border:1px solid rgba(255,255,255,.08);padding:.1rem .35rem;border-radius:3px;
  font-family:var(--mono);font-size:.48rem;}
[data-theme="light"] #kbd-hint kbd{border-color:rgba(0,0,0,.12);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* --- FOOTER BAR --- */
.site-footer-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 2.5rem;
  background:rgba(4,6,12,.75);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  opacity:0;animation:fadeUp .5s .9s ease forwards;
  transition:background .35s;
}
[data-theme="light"] .site-footer-bar{background:rgba(240,244,255,.85);}
.footer-copy{font-family:var(--mono);font-size:.56rem;color:var(--text2);letter-spacing:.06em;}
.footer-domain{font-family:var(--mono);font-size:.56rem;color:var(--text2);letter-spacing:.04em;}

@media(max-width:600px){
  .links{flex-direction:column;align-items:stretch;width:100%;max-width:290px;}
  .lc{justify-content:space-between;}
  .corner,.scan{display:none;}
  .n-first{font-size:clamp(2.4rem,9vw,3.8rem);}
  .n-last{font-size:clamp(3rem,12vw,5rem);}
  #kbd-hint{display:none;}
}
</style>

/* ══ THEME ══ */
(function(){
  const btn = document.getElementById('theme-btn');
  const iconDark = document.getElementById('theme-icon-dark');
  const iconLight = document.getElementById('theme-icon-light');
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let current = saved || (prefersDark ? 'dark' : 'light');

  function apply(theme){
    current = theme;
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    if(theme === 'light'){
      iconDark.style.display = 'none';
      iconLight.style.display = '';
    } else {
      iconDark.style.display = '';
      iconLight.style.display = 'none';
    }
  }
  apply(current);
  btn.addEventListener('click', () => apply(current === 'dark' ? 'light' : 'dark'));
})();

/* ══ BOOT ══ */
(function(){
  const boot = document.getElementById('boot');
  const fill = document.getElementById('bfill');
  const skipBtn = document.getElementById('boot-skip');

  const lines = [
    'INITIALIZING SECURE SHELL...',
    'LOADING IDENTITY MATRIX...',
    'ESTABLISHING HANDSHAKE...',
    'ACCESS GRANTED.'
  ];

  lines.forEach((txt, i) => {

    el.textContent = txt;
    el.style.animationDelay = (i * 150) + 'ms';
    boot.insertBefore(el, boot.querySelector('.boot-bar'));
  });

  function dismiss(){
    boot.classList.add('fade');
    setTimeout(() => boot.remove(), 550);
  }

  skipBtn.addEventListener('click', dismiss);
  skipBtn.addEventListener('keydown', e => { if(e.key === 'Enter' || e.key === ' ') dismiss(); });

  if(reducedMotion){ dismiss(); return; }

  let w = 0;
  const iv = setInterval(() => {
    w += 3.5 + Math.random() * 5;
    if(w >= 100){
      w = 100; clearInterval(iv);
      setTimeout(dismiss, 260);
    }
    fill.style.width = w + '%';
  }, 28);
})();

/* ══ CURSOR + TRAIL (mouse only) ══ */
(function(){
  if(reducedMotion || !window.matchMedia('(pointer:fine)').matches) return;

  const cur = document.getElementById('cur');
  const ring = document.getElementById('cur-ring');
  let mx = -300, my = -300, rx = -300, ry = -300;
  const TRAIL = 10;

  const trail = Array.from({length: TRAIL}, () => {
    const d = document.createElement('div');
    d.className = 'trail-dot';
    d.setAttribute('aria-hidden', 'true');
    d.style.cssText = 'position:fixed;border-radius:50%;pointer-events:none;z-index:9996;transform:translate(-50%,-50%);background:rgba(59,130,246,.2);';
    document.body.appendChild(d);
    return {el: d, x: -300, y: -300};
  });

  const hist = Array(TRAIL * 4).fill({x: -300, y: -300});
  let hi = 0;

  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  (function loop(){
    cur.style.left = mx + 'px'; cur.style.top = my + 'px';
    rx += (mx - rx) * .09; ry += (my - ry) * .09;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    hist[hi % hist.length] = {x: mx, y: my}; hi++;
    trail.forEach((t, i) => {
      const idx = ((hi - 1) - (i + 1) * 3 + hist.length * 10) % hist.length;
      const h = hist[idx]; if(!h) return;
      t.x += (h.x - t.x) * .22; t.y += (h.y - t.y) * .22;
      const size = (TRAIL - i) / TRAIL * 3.5;
      t.el.style.left = t.x + 'px'; t.el.style.top = t.y + 'px';
      t.el.style.width = size + 'px'; t.el.style.height = size + 'px';
      t.el.style.opacity = ((TRAIL - i) / TRAIL * .35);
    });
    requestAnimationFrame(loop);
  })();
})();

/* ══ HEX GRID ══ */
(function(){
  if(reducedMotion) return;
  try {
    const c = document.getElementById('hex-canvas');
    const ctx = c.getContext('2d');
    if(!ctx) return;
    let W, H, hexes = [], frame = 0;
    const SIZE = 38;
    const HW = SIZE * Math.sqrt(3);
    const HH = SIZE * 2;

    function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; build(); }
    function build(){
      hexes = [];
      const cols = Math.ceil(W / HW) + 2, rows = Math.ceil(H / (HH * .75)) + 2;
      for(let r = -1; r < rows; r++) for(let col = -1; col < cols; col++){
        hexes.push({ x: col * HW + (r % 2) * HW / 2, y: r * HH * .75,
          phase: Math.random() * Math.PI * 2, spd: .15 + Math.random() * .3, bright: 0 });
      }
    }
    function hexPath(x, y, s){
      ctx.beginPath();
      for(let i = 0; i < 6; i++){
        const a = Math.PI/3 * i - Math.PI/6;
        i === 0 ? ctx.moveTo(x + s*Math.cos(a), y + s*Math.sin(a))
                : ctx.lineTo(x + s*Math.cos(a), y + s*Math.sin(a));
      }
      ctx.closePath();
    }
    function draw(){
      ctx.clearRect(0,0,W,H); frame++;
      const t = frame * .007;
      hexes.forEach(h => {
        const dx = h.x - mouse.x, dy = h.y - mouse.y, dist = Math.sqrt(dx*dx+dy*dy);
        h.bright += ((dist < 220 ? (1 - dist/220) * .75 : 0) - h.bright) * .055;
        const pulse = (Math.sin(t * h.spd + h.phase) + 1) / 2 * .032;
        const a = pulse + h.bright * .14;
        hexPath(h.x, h.y, SIZE - 2);
        ctx.strokeStyle = `rgba(59,130,246,${a})`; ctx.lineWidth = .65; ctx.stroke();
        if(h.bright > .12){ hexPath(h.x, h.y, SIZE - 2);
          ctx.fillStyle = `rgba(59,130,246,${h.bright * .045})`; ctx.fill(); }
      });
      requestAnimationFrame(draw);
    }
    resize(); window.addEventListener('resize', resize); draw();
  } catch(e) { console.warn('Hex canvas failed:', e); }
})();

/* ══ PARTICLE GRAPH ══ */
(function(){
  if(reducedMotion) return;
  try {
    const c = document.getElementById('bg');
    const ctx = c.getContext('2d');
    if(!ctx) return;
    let W, H, nodes = [], frame = 0;

    function resize(){ W = c.width = innerWidth; H = c.height = innerHeight; init(); }
    function init(){
      /* Capped lower for perf — O(n²) edge checks */
      const n = Math.min(Math.floor(W*H/14000), 70);
      nodes = Array.from({length:n}, () => ({
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-.5)*.38, vy: (Math.random()-.5)*.38,
        r: Math.random()*1.3+.4, op: Math.random()*.4+.15, phase: Math.random()*Math.PI*2
      }));
    }

    /* Spatial grid for edge checks — avoids full O(n²) scan */
    const CELL = 130;
    function buildGrid(){
      const grid = new Map();
      nodes.forEach((n, i) => {
        const key = `${Math.floor(n.x/CELL)},${Math.floor(n.y/CELL)}`;
        if(!grid.has(key)) grid.set(key, []);
        grid.get(key).push(i);
      });
      return grid;
    }

    function draw(){
      ctx.clearRect(0,0,W,H); frame++;
      const t = frame*.009;
      const g = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.6);
      g.addColorStop(0,'rgba(29,78,216,0.03)'); g.addColorStop(1,'transparent');
      ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
      if(mouse.x > -1000){
        const mg = ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,230);
        mg.addColorStop(0,'rgba(59,130,246,0.065)'); mg.addColorStop(1,'transparent');
        ctx.fillStyle = mg; ctx.fillRect(0,0,W,H);
      }

      /* Mouse attraction */
      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if(n.x<0||n.x>W) n.vx*=-1; if(n.y<0||n.y>H) n.vy*=-1;
        const dx=mouse.x-n.x, dy=mouse.y-n.y, d2=dx*dx+dy*dy;
        if(d2<200*200){ const f=(1-Math.sqrt(d2)/200)*.01; n.vx+=dx*f; n.vy+=dy*f;
          const s=Math.sqrt(n.vx*n.vx+n.vy*n.vy); if(s>1.6){n.vx=n.vx/s*1.6;n.vy=n.vy/s*1.6;} }
      });

      /* Draw dots */
      nodes.forEach(n => {
        const op = n.op + Math.sin(t+n.phase)*.07;
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
        ctx.fillStyle = `rgba(96,165,250,${op})`; ctx.fill();
      });

      /* Spatial grid edges */
      const grid = buildGrid();
      const checked = new Set();
      nodes.forEach((n, i) => {
        const cx = Math.floor(n.x/CELL), cy = Math.floor(n.y/CELL);
        for(let ox=-1;ox<=1;ox++) for(let oy=-1;oy<=1;oy++){
          const neighbors = grid.get(`${cx+ox},${cy+oy}`);
          if(!neighbors) continue;
          neighbors.forEach(j => {
            if(j <= i) return;
            const key = i < j ? `${i}-${j}` : `${j}-${i}`;
            if(checked.has(key)) return; checked.add(key);
            const m=nodes[j], ex=n.x-m.x, ey=n.y-m.y, ed=Math.sqrt(ex*ex+ey*ey);
            if(ed<130){ ctx.beginPath(); ctx.moveTo(n.x,n.y); ctx.lineTo(m.x,m.y);
              ctx.strokeStyle=`rgba(59,130,246,${(1-ed/130)*.13})`; ctx.lineWidth=.45; ctx.stroke(); }
          });
        }
      });
      requestAnimationFrame(draw);
    }
    resize(); window.addEventListener('resize',resize); draw();
  } catch(e) { console.warn('Particle canvas failed:', e); }
})();

/* ══ AUDIO ══ */
let actx = null;
function initAudio(){
  if(actx) return;
  try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
}

document.addEventListener('pointerdown', () => {
  initAudio();

/* ── UI click tones ── */
function tick(f=900, d=.05, vol=.013){
  if(!actx) return;
  try{
    if(actx.state === 'suspended') actx.resume();
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.frequency.value=f; o.type='sine';
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001, actx.currentTime+d);
    o.start(); o.stop(actx.currentTime+d);
  }catch(e){}
}
